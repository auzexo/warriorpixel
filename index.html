<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Vouchers</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">WP Vouchers</div>
<div class="voucher-container">
    <div class="voucher">
        <div class="voucher-title">🎁 Free Item Voucher</div>
        <div class="voucher-desc">Redeem this voucher for one free in-app item.</div>
        <div class="voucher-btn" onclick="useVoucher(this)">Use Now</div>
    </div>
    <div class="voucher">
        <div class="voucher-title">🔥 30% Discount Voucher</div>
        <div class="voucher-desc">Get 30% off on your next purchase in the WP Store.</div>
        <div class="voucher-btn" onclick="useVoucher(this)">Use Now</div>
    </div>
    <div class="voucher">
        <div class="voucher-title">⭐ Premium Access Voucher</div>
        <div class="voucher-desc">Unlock premium features for 24 hours.</div>
        <div class="voucher-btn" onclick="useVoucher(this)">Use Now</div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>

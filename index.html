<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarriorPixel — Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="logo">WarriorPixel</h2>

        <a href="#" class="active">Free Fire</a>
        <a href="#">Minecraft</a>
        <a href="#">Achievements</a>
        <a href="#">Info</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Top Bar -->
        <div class="topbar">

            <div class="currency">
                <div class="item">
                    <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
                    <span>1200</span>
                </div>

                <div class="item">
                    <img src="https://cdn-icons-png.flaticon.com/512/992/992651.png">
                    <span>25</span>
                </div>

                <div class="item">
                    <img src="https://cdn-icons-png.flaticon.com/512/3208/3208759.png">
                    <span>3</span>
                </div>
            </div>

            <div class="profile">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            </div>

        </div>

        <!-- Main Body Content -->
        <div class="content">
            <h1>Welcome to WarriorPixel</h1>
            <p>Select a section from the sidebar to continue.</p>
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>

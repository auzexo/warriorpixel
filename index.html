<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarriorPixel — Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="logo">WarriorPixel</h2>
<a href="freefire.html" class="active">Free Fire</a>

    <div class="main">

    <div class="profile">

</div>

        <div class="profile-menu" id="profileMenu">

        <div class="content">

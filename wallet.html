<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet — WarriorPixel</title>
    <link rel="stylesheet" href="wallet.css">
</head>
<body>

    <!-- Wallet Container -->
    <div class="wallet-container">

        <h1>Wallet</h1>

        <!-- Balance Section -->
        <div class="wallet-balance">
            <h2>Total Balance</h2>
            <p class="amount">₹ 1,250</p>
        </div>

        <!-- Action Buttons -->
        <div class="wallet-actions">
            <button id="addMoney">Add Money</button>
            <button id="withdrawMoney">Withdraw</button>
        </div>

        <!-- Transactions List -->
        <div class="wallet-transactions">
            <h3>Recent Transactions</h3>

            <ul id="txnList">
                <li>+ ₹200 — Added</li>
                <li>- ₹50 — Tournament Entry</li>
                <li>+ ₹300 — Reward</li>
            </ul>
        </div>

    </div>
    <script src="wallet.js"></script>
</body>
</html>
